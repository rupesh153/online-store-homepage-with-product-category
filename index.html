<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛒 Online Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <h1>🛒 Online Store</h1>

    <!-- SEARCH -->
    <input type="text" id="search" placeholder="🔍 Search products...">
<!-- CART ICON -->
 <div class="cart-box" onclick="goToCart()">
    🛒 <span id="cartCount">0</span>
</div>
    <!-- CATEGORY -->
    <nav class="category-menu">
        <button onclick="filterCategory('all')">All</button>
        <button onclick="filterCategory('electronics')">Electronics</button>
        <button onclick="filterCategory('jewelery')">Jewelry</button>
       <button onclick="filterCategory(`men's clothing`)">Men</button>
       <button onclick="filterCategory(`women's clothing`)">Women</button>
    </nav>
</header>
<!-- slider-->
<!-- FILTER SECTION -->
<section class="filters">

    <!-- PRICE -->
    <div class="price-box">
        <label>Max Price: ₹<span id="priceValue">50000</span></label>
        <input type="range"class='range' id="priceRange" min="0" max="50000" value="50000">
    </div>

    <!-- SORT -->
    <select id="sortPrice">
        <option value="default">Sort by Price</option>
        <option value="low">Low → High</option>
        <option value="high">High → Low</option>
    </select>

    <!-- RATING -->
    <select id="ratingFilter">
        <option value="all">All Ratings</option>
        <option value="4">4★ & above</option>
        <option value="3">3★ & above</option>
    </select>

</section>

<!-- PRODUCTS -->
<main id="productContainer" class="product-grid"></main>
<!-- CART POPUP -->
<div id="cartPopup" class="popup">
    <div class="popup-content">
        <span class="close-btn" onclick="closePopup()">❌</span>

        <img id="popupImg">
        <h2 id="popupTitle"></h2>
        <p id="popupPrice"></p>

        <!-- Quantity -->
        <div class="qty-box">
            <button onclick="changeQty(-1)">➖</button>
            <span id="qty">1</span>
            <button onclick="changeQty(1)">➕</button>
        </div>

        <button class="confirm-btn" onclick="confirmAddToCart()">
            Add to Cart ✅
        </button>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
